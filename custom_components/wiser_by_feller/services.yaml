status_light:
  description: Set device status light
  fields:
    device:
      required: true
      selector:
        device:
          filter:
            - integration: wiser_by_feller
    color:
      required: true
      default:
        - 26
        - 188
        - 242
      selector:
        color_rgb:
    channel:
      required: true
      default: "0"
      selector:
        select:
          translation_key: "select_channel"
          options: ["0", "1", "2", "3"]
    brightness_on:
      required: true
      default: 255
      selector:
        number:
          min: 0
          max: 255
    brightness_off:
      required: false
      selector:
        number:
          min: 0
          max: 255

set_button_led_override:
  name: Set Button LED Override
  description: Set a temporary LED override on a Wiser button LED.
  fields:
    config_entry_id:
      name: µGateway
      description: The µGateway the button belongs to. Optional if you only have one; required when multiple µGateways are configured.
      required: false
      selector:
        config_entry:
          integration: wiser_by_feller

    button_id:
      name: Button ID
      description: Wiser button ID. Use the `find_button` service to discover it.
      required: true
      selector:
        number:
          min: 0
          mode: box

    led_index:
      name: LED
      description: Which LED to control on the button.
      required: true
      default: "0"
      selector:
        select:
          translation_key: "select_led_index"
          options: ["0", "1"]

    rgb_color:
      name: RGB Color
      description: LED color.
      required: true
      default:
        - 26
        - 188
        - 242
      selector:
        color_rgb:

    effect:
      name: Effect
      description: LED blink pattern.
      required: false
      default: permanent
      selector:
        select:
          options:
            - permanent
            - ramp
            - ramp_up
            - ramp_down
            - slow
            - fast

clear_button_led_override:
  name: Clear Button LED Override
  description: Disable the temporary LED override and return to the configured Wiser LED behavior.
  fields:
    config_entry_id:
      name: µGateway
      description: The µGateway the button belongs to. Optional if you only have one; required when multiple µGateways are configured.
      required: false
      selector:
        config_entry:
          integration: wiser_by_feller

    button_id:
      name: Button ID
      description: Wiser button ID. Use the Find Button service to discover it.
      required: true
      selector:
        number:
          min: 0
          mode: box

    led_index:
      name: LED
      description: Which LED to control on the button.
      required: true
      default: "0"
      selector:
        select:
          translation_key: "select_led_index"
          options: ["0", "1"]

find_button:
  name: Find Button
  description: >
    Activates find-me mode on all buttons. All button LEDs start blinking.
    Press any physical button to identify it. The button ID, device, channel,
    label, and LED options are returned as the service response and shown as a notification.
  fields:
    config_entry_id:
      name: µGateway
      description: The µGateway to activate find-me mode on. Optional if you only have one; required when multiple µGateways are configured.
      required: false
      selector:
        config_entry:
          integration: wiser_by_feller
