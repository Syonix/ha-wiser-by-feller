# Runs tests (Python 3.13+, matching HA's minimum requirement) and linting.
name: Test & Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install linting dependencies
        run: pip install -r requirements.dev.txt
      - name: Lint with ruff
        run: ruff check custom_components tests
      - name: Lint formatting with ruff
        run: ruff format --check --diff custom_components tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13.3"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements.test.txt ]; then pip install -r requirements.test.txt; fi
      - name: Install mypy
        run: pip install mypy
      - name: Run mypy
        run: mypy custom_components/wiser_by_feller/
      - name: Run tests
        run: pytest tests/ --junitxml=junit.xml --cov=custom_components/wiser_by_feller --cov-report=term-missing:skip-covered --cov-report=xml --cov-report=html
      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
